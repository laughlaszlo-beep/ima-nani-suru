<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>いま なにする？</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: rgba(255, 255, 255, 0.9);
      color: #111827;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      padding: 0;
      overflow: hidden;
    }

    .app {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #fef3c7, #dbeafe, #ede9fe);
      padding: clamp(28px, 5vw, 56px);
      text-align: center;
      display: grid;
      grid-template-columns: minmax(320px, 0.85fr) minmax(0, 1.15fr);
      gap: clamp(44px, 7vw, 88px);
      align-items: center;
    }

    .time {
      font-size: clamp(80px, 11vw, 150px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.05em;
      color: #2563eb;
      margin-bottom: 14px;
    }

    .date {
      font-size: clamp(15px, 1.5vw, 20px);
      color: #64748b;
      font-weight: 700;
      margin-bottom: 0;
    }

    .side-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding-inline: clamp(32px, 5vw, 72px);
    }

    .main-panel {
      width: 100%;
      min-width: 0;
    }

    .task-card {
      width: 100%;
      min-width: 0;
      background: linear-gradient(135deg, #60a5fa, #818cf8);
      color: white;
      border-radius: clamp(30px, 4vw, 46px);
      padding: clamp(34px, 5vw, 58px) clamp(28px, 4vw, 48px) clamp(30px, 4vw, 46px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 16px 36px rgba(79, 70, 229, 0.18);
    }

    .label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(14px, 1.5vw, 18px);
      color: #eff6ff;
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: 7px 13px;
      margin-bottom: 20px;
      letter-spacing: 0.01em;
    }

    .task-icon {
      font-size: clamp(58px, 8vw, 96px);
      line-height: 1;
      margin-bottom: 14px;
    }

    .task-main {
      font-size: clamp(42px, 5.8vw, 82px);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: 0.01em;
      margin-bottom: 16px;
      white-space: nowrap;
      max-width: 100%;
      overflow: hidden;
    }

    .task-note {
      color: #eff6ff;
      font-size: clamp(18px, 2vw, 24px);
      line-height: 1.7;
      margin: 0 auto;
      max-width: 560px;
    }

    .progress-wrap {
      width: 100%;
      min-width: 0;
      margin-top: 20px;
    }

    .progress-bar {
      width: 100%;
      max-width: 100%;
      height: clamp(14px, 1.6vw, 20px);
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #f59e0b, #ef4444);
      transition: width 0.4s ease;
    }

    .progress-label {
      font-size: clamp(12px, 1.4vw, 16px);
      font-weight: 700;
      color: #64748b;
      margin-top: 10px;
      margin-bottom: 0;
    }

    .next-card {
      max-width: 100%;
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #f1f5f9;
      color: #64748b;
      font-size: clamp(13px, 1.4vw, 16px);
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .footer {
      grid-column: 1 / -1;
      margin-top: 0;
      color: #94a3b8;
      font-size: 11px;
      line-height: 1.7;
    }

    @media (max-width: 760px) {
      body {
        overflow: auto;
      }

      .app {
        width: 100%;
        min-height: 100vh;
        height: auto;
        padding: 22px;
        display: block;
      }

      .side-panel {
        min-height: auto;
        margin-bottom: 22px;
        padding-inline: 0;
      }

      .time {
        font-size: clamp(44px, 13vw, 82px);
        margin-bottom: 10px;
      }

      .date {
        font-size: 14px;
        margin-bottom: 0;
      }

      .task-card {
        border-radius: 28px;
        padding: 28px 20px 24px;
      }

      .task-icon {
        font-size: clamp(46px, 12vw, 74px);
      }

      .task-main {
        font-size: clamp(28px, 7.5vw, 46px);
      }

      .task-note {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="side-panel">
      <div class="time" id="clock"></div>
      <div class="date" id="todayDate"></div>
    </section>

    <section class="main-panel">
      <section class="task-card">
      <div class="label">いま すること</div>
      <div class="task-icon" id="taskIcon"></div>
      <div class="task-main" id="taskMain"></div>
      <p class="task-note" id="taskNote"></p>
    </section>

    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-label" id="progressLabel"></div>
    </div>

    <div class="next-card" id="nextTask"></div>
    </section>
  </main>

  <script>
    const DAY_END_MINUTES = 24 * 60;

    const TASKS = [
      {
        start: "00:00",
        end: "07:00",
        icon: "🌈",
        main: "じゆうじかん",
        note: "じぶんで すごしかたを きめよう。"
      },
      {
        start: "07:00",
        end: "07:20",
        icon: "👕",
        main: "おきがえ",
        note: "はてな つける → かみのけセット"
      },
      {
        start: "07:20",
        end: "07:45",
        icon: "🍚",
        main: "あさごはん",
        note: "あさごはん を たべよう。"
      },
      {
        start: "07:45",
        end: "07:50",
        icon: "🫧",
        main: "かお を あらおう",
        note: "すいとう と ランチセット を もとう。"
      },
      {
        start: "07:50",
        end: "08:00",
        icon: "🎒",
        main: "しゅっぱつ",
        note: "きをつけて いってらっしゃい。"
      },
      {
        start: "08:00",
        end: "08:05",
        icon: "⏰",
        main: "いそいで！",
        note: "いそいで！しゅっぱつ！"
      },
      {
        start: "08:05",
        end: "16:00",
        icon: "🏫",
        main: "学校にいるじかん",
        note: "おべんきょう がんばってね。"
      },
      {
        start: "16:00",
        end: "17:30",
        icon: "✏️",
        main: "しゅくだいタイム",
        note: "おわったら、じゆうじかん。"
      },
      {
        start: "17:30",
        end: "19:30",
        icon: "🍽️",
        main: "ディナータイム",
        note: "ママの おてつだい しよう。"
      },
      {
        start: "19:30",
        end: "20:30",
        icon: "🛁",
        main: "おふろタイム",
        note: "はみがきも わすれずに。"
      },
      {
        start: "20:30",
        end: "21:00",
        icon: "🛌",
        main: "おふとん へ GO",
        note: "そろそろ ねる じゅんび。"
      },
      {
        start: "21:00",
        end: "24:00",
        icon: "🌙",
        main: "おやすみタイム",
        note: "ぐっすり おやすみ。"
      }
    ];

    function timeToMinutes(timeText) {
      if (typeof timeText !== "string") return 0;
      const match = timeText.match(/^(\d{1,2}):(\d{2})$/);
      if (!match) return 0;

      const hour = Number(match[1]);
      const minute = Number(match[2]);

      if (!Number.isFinite(hour) || !Number.isFinite(minute)) return 0;
      if (hour < 0 || hour > 24 || minute < 0 || minute > 59) return 0;
      if (hour === 24 && minute !== 0) return 0;

      return hour * 60 + minute;
    }

    function getMinutesNow(date) {
      return date.getHours() * 60 + date.getMinutes() + date.getSeconds() / 60;
    }

    function getCurrentTask(date) {
      const now = getMinutesNow(date);
      return TASKS.find(task => now >= timeToMinutes(task.start) && now < timeToMinutes(task.end)) || TASKS[TASKS.length - 1];
    }

    function getNextTask(date) {
      const now = getMinutesNow(date);
      return TASKS.find(task => now < timeToMinutes(task.start)) || null;
    }

    function getTaskProgress(date, task) {
      if (!task) return 100;

      const now = getMinutesNow(date);
      const start = timeToMinutes(task.start);
      const end = timeToMinutes(task.end);
      const duration = end - start;

      if (duration <= 0) return 100;

      const elapsed = now - start;
      return Math.max(0, Math.min(100, (elapsed / duration) * 100));
    }

    function getRemainingMinutes(date, task) {
      if (!task) return 0;

      const now = getMinutesNow(date);
      const end = timeToMinutes(task.end);
      return Math.max(0, Math.ceil(end - now));
    }

    function formatDate(date) {
      return new Intl.DateTimeFormat("ja-JP", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long"
      }).format(date);
    }

    function formatClock(date) {
      return new Intl.DateTimeFormat("ja-JP", {
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function getElement(id) {
      const element = document.getElementById(id);
      if (!element) {
        throw new Error(`#${id} が見つかりません。`);
      }
      return element;
    }

    function createElements() {
      return {
        clock: getElement("clock"),
        todayDate: getElement("todayDate"),
        taskIcon: getElement("taskIcon"),
        taskMain: getElement("taskMain"),
        taskNote: getElement("taskNote"),
        progressFill: getElement("progressFill"),
        progressLabel: getElement("progressLabel"),
        nextTask: getElement("nextTask")
      };
    }

    function fitTextToWidth(element, maxSize, minSize) {
      element.style.fontSize = `${maxSize}px`;

      while (element.scrollWidth > element.clientWidth && maxSize > minSize) {
        maxSize -= 1;
        element.style.fontSize = `${maxSize}px`;
      }
    }

    function render(elements, date = new Date()) {
      const task = getCurrentTask(date);
      const nextTask = getNextTask(date);
      const progress = getTaskProgress(date, task);
      const remainingMinutes = getRemainingMinutes(date, task);

      elements.clock.textContent = formatClock(date);
      elements.todayDate.textContent = formatDate(date);
      elements.taskIcon.textContent = task.icon;
      elements.taskMain.textContent = task.main;
      fitTextToWidth(elements.taskMain, 82, 30);
      elements.taskNote.textContent = task.note;
      elements.progressFill.style.width = `${progress}%`;
      elements.progressLabel.textContent = `あと ${remainingMinutes} ぷん`;

      if (nextTask) {
        elements.nextTask.textContent = `つぎは ${nextTask.start} から ${nextTask.main}`;
        elements.nextTask.style.display = "inline-flex";
      } else {
        elements.nextTask.textContent = "";
        elements.nextTask.style.display = "none";
      }
    }

    function runTests() {
      console.assert(timeToMinutes("07:10") === 430, "時刻を分に変換できる");
      console.assert(timeToMinutes("24:00") === 1440, "24:00を分に変換できる");
      console.assert(timeToMinutes("24:01") === 0, "不正な24時台は0になる");
      console.assert(getCurrentTask(new Date("2026-05-11T06:30:00")).main === "じゆうじかん", "6:30はじゆうじかん");
      console.assert(getCurrentTask(new Date("2026-05-11T07:10:00")).main === "おきがえ", "7:10はおきがえ");
      console.assert(getCurrentTask(new Date("2026-05-11T07:30:00")).main === "あさごはん", "7:30はあさごはん");
      console.assert(getCurrentTask(new Date("2026-05-11T07:45:00")).main === "かお を あらおう", "7:45はかお を あらおう");
      console.assert(getCurrentTask(new Date("2026-05-11T16:30:00")).main === "しゅくだいタイム", "16:30はしゅくだいタイム");
      console.assert(getCurrentTask(new Date("2026-05-11T17:40:00")).main === "ディナータイム", "17:40はディナータイム");
      console.assert(getCurrentTask(new Date("2026-05-11T19:40:00")).main === "おふろタイム", "19:40はおふろタイム");
      console.assert(getCurrentTask(new Date("2026-05-11T21:30:00")).main === "おやすみタイム", "21:30はおやすみタイム");
      console.assert(getRemainingMinutes(new Date("2026-05-11T23:59:30"), getCurrentTask(new Date("2026-05-11T23:59:30"))) === 1, "23:59:30の残り時間は1分");
      console.assert(getTaskProgress(new Date("2026-05-11T23:59:30"), getCurrentTask(new Date("2026-05-11T23:59:30"))) >= 0, "深夜直前でも進捗計算で落ちない");
      console.assert(getNextTask(new Date("2026-05-11T21:30:00")) === null, "最後の予定中は次の予定なし");
    }

    document.addEventListener("DOMContentLoaded", () => {
      runTests();
      const elements = createElements();
      render(elements);
      setInterval(() => render(elements), 1000);
    });
  </script>
</body>
</html>
